name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java / Maven)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests & generate JaCoCo report
        working-directory: backend
        run: mvn -B test
        env:
          # 测试全部使用 Mockito（@WebMvcTest + @ExtendWith(MockitoExtension.class)），
          # 不启动完整 Spring 上下文，无需真实数据库
          AI_API_KEY: dummy-key-for-ci

      - name: Print coverage summary
        working-directory: backend
        run: mvn -B jacoco:report && cat target/site/jacoco/index.html | grep -o 'Total[^%]*%' | head -5 || echo "Coverage report generated at target/site/jacoco/index.html"

  frontend:
    name: Frontend (React / TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: fronted/package-lock.json

      - name: Install dependencies
        working-directory: fronted
        run: npm ci

      - name: Type check
        working-directory: fronted
        run: npx tsc --noEmit

      - name: Build
        working-directory: fronted
        run: npm run build
